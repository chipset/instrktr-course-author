name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: instrktr-course-author-vsix
          path: '*.vsix'
